backend: mujoco
mujoco:
  seed: 42
  timestep: 0.002
  gravity: [0, 0, -9.81]
  gui: true
  obstacle_toggle: true

  lights:
    - name: table_key
      pos: [0.6, -0.5, 1.6]
      dir: [0.0, 0.3, -1.0]
      diffuse: [0.7, 0.7, 0.75]
      specular: [0.15, 0.15, 0.2]
      attenuation: [1.0, 0.2, 0.05]
      cutoff: 70
    - name: fill_user
      pos: [0.2, -1.2, 1.3]
      dir: [0.4, 0.6, -1.0]
      diffuse: [0.5, 0.55, 0.7]
      specular: [0.08, 0.08, 0.15]
      attenuation: [1.0, 0.1, 0.02]
    - name: overhead_fill
      pos: [0.6, 0.0, 2.2]
      dir: [0.0, 0.0, -1.0]
      diffuse: [0.45, 0.45, 0.5]
      specular: [0.05, 0.05, 0.08]
      attenuation: [1.0, 0.05, 0.01]
      cutoff: 120
  camera:
    name: static
    width: 640
    height: 480
    near: 0.01
    far: 5.0
    pos: [1.613, -0.109, 1.389]
    rpy: [0.0, 0.0, 1.57] # roll, pitch, yaw in radians
    target: [0.6, 0.0, 0.82]

  # Wrist-mounted camera on the robot end-effector
  wrist_camera:
    enable: true
    name: wrist_cam
    pos: [0.0, 0.0, 0.05]
    # xyaxes defines camera X and Y axes in the EE frame; Z is X x Y and camera looks along -Z
    xyaxes: "1 0 0 0 -1 0"

  user_camera:
    enable: true
    name: user_cam
    pos: [0.35, -1.05, 1.05]
    target: [0.6, 0.0, 0.75]

  extra_cameras:
    - name: side_cam
      pos: [0.95, 0.35, 0.95]
      target: [0.6, 0.0, 0.75]

  ycb_objects: []

  # Moving obstacles configuration - If not specified, two default obstacles are created
  moving_obstacles:
    - name: obstacle_lr
      size: [0.06, 0.06, 0.06] # sphere radius (or half-sizes for box)
      rgba: "1.0 0.0 0.0 1" # red
      center: [0.75, 0.4, 1.05] # starting position [x, y, z]
      axis: x # movement direction: 'x', 'y', or 'z'
      amplitude: 0.25 # movement range (meters) along the axis
      frequency: 0.5 # movement speed (Hz)
      phase: 0.0 # phase offset (radians)
      gravity: false
      jitter_scale: 0.03 # meters
      jitter_smooth: 0.95 # closer to 1 = smoother
    - name: obstacle_tb
      size: [0.06, 0.06, 0.06]
      rgba: "1.0 0.5 0.0 1" # orange
      center: [0.55, 0.0, 1.05]
      axis: y # movement along y-axis
      amplitude: 0.5 # larger range for table width sweep
      frequency: 0.5
      phase: 1.0472 # 60 degrees in radians
      gravity: false
      jitter_scale: 0.03 # meters
      jitter_smooth: 0.95 # closer to 1 = smoother

  grasp_object:
    name: sample_object
    body: sample_object
    xml: assets/mujoco_objects/YcbMustardBottle/textured.xml # to change the grasp object update this
    place: table_center
    pos: [0.32, -0.6, 0.8]
    quat_xyzw: [0.0, 0.0, 0.0, 1.0]

table:
  size: [0.65, 0.95, 0.025]
  pos: [0.6, 0.0, 0.7]
  gravity: false
  feet:
    size: [0.035, 0.035, 0.35] # half sizes (x,y,z)
    rgba: "0.3 0.24 0.18 1"

# Small open-top basket on table
basket:
  inner: [0.25, 0.25] # inner dimensions (x, y)
  height: 0.08 # wall height
  thickness: 0.006 # wall thickness
  pos: [0.5, 0.52, 0.7]
  place: table_center
  margin: 0.0 # pull inward from edge so it stays on table
  rgba_wall: "0.3 0.3 0.3 1"
  rgba_base: "0.25 0.25 0.25 1"

robot_settings:
  robot_xml: mujoco_menagerie/franka_emika_panda/mjx_panda.xml
  ee_body_name: hand # Panda gripper base body
  robot_base_body: link0 # Base body name in the robot XML
  base_margin: 0.12 # inset from table edge (meters)
  base_yaw: 0.0 # radians; align with table long axis
  default_joint_positions: [-1.2, 0.058, 0.31, -2.64, -0.116, 2.79, 1.85]
  default_gripper_opening: 0.03
  base_position: [0.0, 0.0, 0.62]
  base_orientation_euler: [0.0, 0.0, 0.0]
  ee_offset: [0.0, 0.0, 0.0]
